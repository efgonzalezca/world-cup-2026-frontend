version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wc2026-frontend
    env_file: .env
    ports:
      - '5173:5173'
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  frontend_node_modules:
